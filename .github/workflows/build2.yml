name: Build Windows & macOS

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller PyPDF2

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller --onefile --windowed --name "PDF页面提取工具" export_pdf_gui.py

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --onefile --windowed --name "PDF页面提取工具" export_pdf_gui.py
          cd dist && zip -r PDF页面提取工具-macOS.zip "PDF页面提取工具"

      - name: Upload (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: PDF提取工具-Windows
          path: dist/PDF页面提取工具.exe

      - name: Upload (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: PDF提取工具-macOS
          path: dist/PDF页面提取工具-macOS.zip
